<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    </header>
    <main>
    <section id="contact">
        <h2>Contact</h2>
        <p>This is the contact section of my web page.</p>
        <form id="myFormulary">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <div id="Confirmationmessage" class="confirmation" style="display:none;">
            <p>Thank you for your message! We will get back to you soon.</p>
            <button onclick="reloadForm()">Send Another Message</button>
        </div>
    </section>
    </main>
    <footer>
        <p>&copy; 2026 Trevor's Web Page. All rights reserved.</p>
    </footer>

<script>
    document.getElementById("myFormulary").addEventListener("submit", function(event) {
        event.preventDefault();
        const formData = new FormData(this);
        fetch("https://formspree.io/f/mzdywanv", {
            method: "POST",
            body: formData,
            headers: {
                "Accept": "application/json"
            }
        }).then(response => {
            if (response.ok) {
                document.getElementById("myFormulary").style.display = "none"; 
                document.getElementById("Confirmationmessage").style.display = "block";
            } else {
                alert("There was a problem submitting your message. Please try again.");
            }
        })
        .catch(error => {
            console.error("Error:" + error);
            alert("There was a problem submitting your message. Please try again.");
        });
    });
    function reloadForm() {
        document.getElementById("myFormulary").style.display = "block";
        document.getElementById("Confirmationmessage").style.display = "none";
        document.getElementById("myFormulary").reset(); 
    }
</script>
</body>
</html>
