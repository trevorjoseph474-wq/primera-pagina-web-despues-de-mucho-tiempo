<script>
    document.getElementById("myFormulary").addEventListener("submit", function(event) {
        event.preventDefault(); // Prevent the default form submission
        const formData = new FormData(this);
        fetch("https://formspree.io/f/mzdywanv", {
            method: "POST",
            body: formData,
            headers: {
                "Accept": "application/json"
            }
        }).then(response => {
            if (response.ok) {
                document.getElementById("myFormulary").style.display = "none"; // Hide the form
                document.getElementById("Confirmationmessage").style.display = "block";
            } else {
                alert("There was a problem submitting your message. Please try again.");
            }
        })
        .catch(error => {
            console.error("Error:" + error);
            alert("There was a problem submitting your message. Please try again.");
        });
    });
    function reloadForm() {
        document.getElementById("myFormulary").style.display = "block"; // Show the form
        document.getElementById("Confirmationmessage").style.display = "none"; // Hide the confirmation message
        document.getElementById("myFormulary").reset(); // Reset the form fields
    }
</script>
